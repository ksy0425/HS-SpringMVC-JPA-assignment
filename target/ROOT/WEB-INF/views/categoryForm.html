<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') +
    '   |   학번: 2171194   |   성명: 김성윤'}">학번: 2171194   |   성명: 김성윤</p>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
</head>
<body>

<h2>카테고리 등록</h2>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">

    <button type="submit">등록</button>
</body>
</html>
